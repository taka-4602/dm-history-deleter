<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM History Deleter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #202225; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #7289da; }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #2f3136, #1e1f22);
      color: #fff;
      margin: 0; padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #36393f;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,.5);
      width: 100%;
      max-width: 500px;
      animation: fadeIn .8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h2 { color: #adb8ff; text-align: center; margin: 0 0 24px; font-weight: 600; }
    label { display: block; margin-top: 18px; font-size: 14px; font-weight: 500; }

    input[type="text"] {
      width: 100%; padding: 10px; margin-top: 6px;
      border-radius: 8px; border: 1px solid #202225;
      background: #202225; color: #dcddde;
      font-family: monospace;
    }

    .option-group {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f3136;
      padding: 10px;
      border-radius: 8px;
    }
    .option-group input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer;
    }
    .option-group label {
      margin-top: 0;
      cursor: pointer;
      font-size: 13px;
      color: #b9bbbe;
    }

    button {
      padding: 10px 16px; border: none; border-radius: 8px;
      color: #fff; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: all .3s;
    }
    button.primary {
      margin-top: 24px; width: 100%; padding: 14px;
      background: linear-gradient(135deg,#c0392b, #e74c3c);
      font-size: 16px;
      box-shadow: 0 4px 15px rgba(231, 76, 60, .4);
    }
    button.primary:hover {
      background: linear-gradient(135deg,#e74c3c, #c0392b);
      box-shadow: 0 6px 22px rgba(231, 76, 60, .6);
      transform: translateY(-2px);
    }
    button.secondary {
        background: #4f545c;
    }
    button.secondary:hover {
        background: #5a5f68;
    }
    button:disabled {
      cursor: not-allowed; background: #3e4147 !important; color: #9a9a9a;
      transform: none; box-shadow: none;
    }

    .button-group {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 12px;
    }

    #log { margin-top: 20px; padding: 10px; height: 180px; overflow-y: auto; background: #202225; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; resize: vertical;}
  </style>
</head>
<body>
  <div class="card">
    <h2>DM History Deleter</h2>
    <form id="form">
      <label for="token">トークン</label>
      <input type="text" id="token" required placeholder="MT...............">

      <label for="userId">相手のユーザーID</label>
      <input type="text" id="userId" required placeholder="1234567890">
      
      <div class="option-group">
        <input type="checkbox" id="oldestFirst">
        <label for="oldestFirst">過去のメッセージ（古い順）から削除する</label>
      </div>

      <button id="submitBtn" type="submit" class="primary">DM履歴を削除</button>
      
      <div class="button-group">
          <button id="stopBtn" type="button" class="secondary" disabled>停止</button>
      </div>
    </form>

    <div id="log"></div>
  </div>

<script>
const tokenInput = document.getElementById('token');
const userIdInput = document.getElementById('userId');
const oldestFirstCheckbox = document.getElementById('oldestFirst');
const form = document.getElementById('form');
const submitBtn = document.getElementById('submitBtn');
const stopBtn = document.getElementById('stopBtn');
const logEl = document.getElementById('log');

const x_super_properties = "eyJvcyI6IldpbmRvd3MiLCJicm93c2VyIjoiQ2hyb21lIiwiZGV2aWNlIjoiIiwic3lzdGVtX2xvY2FsZSI6ImphLUFQIiwiaGFzX2NsaWVudF9tb2RzIjpmYWxzZSwiYnJvd3Nlcl91c2VyX2FnZW50IjoiTW96aWxsYS81LjAgKFdpbmRvd3MgTlQgMTAuMDsgV2luNjQ7IHg2NCkgQXBwbGVXZWJLaXQvNTM3LjM2IChLSFRNTCwgbGlrZSBHZWNrbykgQ2hyb21lLzEyNi4wLjAuMCBTYWZhcmkvNTM3LjM2IiwiYnJvd3Nlcl92ZXJzaW9uIjoiMTI2LjAuMC4wIiwib3NfdmVyc2lvbiI6IjEwIiwicmVmZXJyZXIiOiJodHRwczovL2Rpc2NvcmQuY29tL2NoYW5uZWxzL0BtZSIsInJlZmVycmluZ19kb21haW5fY3VycmVudCI6IiIsInJlbGVhc2VfY2hhbm5lbCI6InN0YWJsZSIsImNsaWVudF9idWlsZF9udW1iZXIiOjk5OTk5OSwiY2xpZW50X2V2ZW50X3NvdXJjZSI6bnVsbH0=";

let shouldStop = false;

function appendLog(text) {
  const time = new Date().toLocaleTimeString('ja-JP');
  logEl.textContent += `\n[${time}] ${text}`;
  logEl.scrollTop = logEl.scrollHeight;
}
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setControlsState(isExecuting) {
    submitBtn.disabled = isExecuting;
    stopBtn.disabled = !isExecuting;
    tokenInput.disabled = isExecuting;
    userIdInput.disabled = isExecuting;
    oldestFirstCheckbox.disabled = isExecuting;
}

async function getMyId(token) {
    appendLog("⏳ 自身のユーザー情報を確認中...");
    try {
        const response = await fetch('https://discord.com/api/v9/users/@me', {
            headers: { 'Authorization': token, 'x-super-properties': x_super_properties },
            referrerPolicy: "no-referrer"
        });
        if (!response.ok) {
            throw new Error(`[${response.status}] 自身の情報の取得に失敗。トークンが正しいか確認してください。`);
        }
        const me = await response.json();
        appendLog(`✅ ユーザー情報を確認しました (ID: ${me.id})`);
        return me.id;
    } catch (error) {
        appendLog(`❌ エラー: ${error.message}`);
        return null;
    }
}

async function getDmChannelId(token, userId) {
    appendLog("⏳ DMチャンネルを探しています...");
    try {
        const response = await fetch('https://discord.com/api/v9/users/@me/channels', {
            method: 'POST',
            headers: {
                'Authorization': token,
                'Content-Type': 'application/json',
                'x-super-properties': x_super_properties
            },
            body: JSON.stringify({ recipient_id: userId }),
            referrerPolicy: "no-referrer"
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(`[${response.status}] ${errorData.message || 'DMチャンネルの取得に失敗しました。ユーザーIDが正しいか確認してください。'}`);
        }
        const channel = await response.json();
        appendLog(`✅ DMチャンネルが見つかりました (ID: ${channel.id})`);
        return channel.id;

    } catch (error) {
        appendLog(`❌ エラー: ${error.message}`);
        return null;
    }
}

async function deleteAllMyMessages(token, channelId, myId) {
    const isOldestFirst = oldestFirstCheckbox.checked;
    // 古い順なら "0" (最初から)、新しい順なら null (直近から) を起点にする
    let cursorId = isOldestFirst ? "0" : null;
    let messagesDeleted = 0;
    

    while (!shouldStop) {
        let url = `https://discord.com/api/v9/channels/${channelId}/messages?limit=100`;
        
        if (isOldestFirst) {
            url += `&after=${cursorId}`; // cursorId より後のメッセージを取得
        } else if (cursorId) {
            url += `&before=${cursorId}`; // cursorId より前のメッセージを取得
        }

        appendLog(`⏳ メッセージのバッチを取得中... [${isOldestFirst ? '古い順' : '新しい順'}]`);
        
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': token, 'x-super-properties': x_super_properties },
                referrerPolicy: "no-referrer"
            });

            if (!response.ok) {
                if(response.status === 429) {
                    const errorData = await response.json();
                    const retryAfter = (errorData.retry_after || 1) * 1000;
                    appendLog(`⏳ レート制限。${(retryAfter / 1000).toFixed(2)}秒待機します...`);
                    await sleep(retryAfter);
                    continue;
                }
                throw new Error(`[${response.status}] メッセージの取得に失敗しました。`);
            }

            let messages = await response.json();
            if (messages.length === 0) {
                appendLog("✅ これ以上削除するメッセージはありません。");
                break;
            }

            // after(古い順)で取得した場合、APIはデフォルトで降順(新しい順)で返す場合があるためソート
            if (isOldestFirst) {
                messages.sort((a, b) => a.id.localeCompare(b.id)); // ID昇順（古い順）
            }

            const myMessages = messages.filter(msg => msg.author.id === myId);
            
            for (const message of myMessages) {
                if (shouldStop) break;
                
                appendLog(`... メッセージを削除中 (ID: ${message.id})`);
                const deleteResponse = await fetch(`https://discord.com/api/v9/channels/${channelId}/messages/${message.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token, 'x-super-properties': x_super_properties }
                });

                if (deleteResponse.ok) {
                    messagesDeleted++;
                    appendLog(`🗑️ 削除成功`);
                    await sleep(500); // 連続削除による検知を和らげるための微小待機
                } else if (deleteResponse.status === 429) {
                    const errorData = await deleteResponse.json();
                    const retryAfter = (errorData.retry_after || 1) * 1000;
                    appendLog(`⏳ レート制限。${(retryAfter / 1000).toFixed(2)}秒待機します...`);
                    await sleep(retryAfter);
                } else {
                    appendLog(`❌ 削除失敗 (ID: ${message.id}) Status: ${deleteResponse.status}`);
                }
            }

            // 次の取得位置を更新
            // 古い順なら取得した中で一番「新しい」ID、新しい順なら一番「古い」IDを起点にする
            cursorId = isOldestFirst ? messages[messages.length - 1].id : messages[messages.length - 1].id;

        } catch(error) {
            appendLog(`❌ エラー: ${error.message}`);
            break;
        }
    }
    return messagesDeleted;
}

async function startDeletion() {
  shouldStop = false;
  setControlsState(true);
  
  const token = tokenInput.value.trim();
  const userId = userIdInput.value.trim();

  if (!token || !userId) {
    appendLog("⚠️ トークンとユーザーIDを両方入力してください。");
    setControlsState(false);
    return;
  }
  
  const myId = await getMyId(token);
  if (!myId) {
    appendLog("🛑 自身のユーザーIDが取得できなかったため、処理を中止しました。");
    setControlsState(false);
    return;
  }
  
  const dmChannelId = await getDmChannelId(token, userId);
  
  if (dmChannelId) {
      const totalDeleted = await deleteAllMyMessages(token, dmChannelId, myId);
      if (shouldStop) {
        appendLog(`🛑 処理が手動で停止されました。合計 ${totalDeleted} 件のメッセージを削除しました。`);
      } else {
        appendLog(`🎉 完了！合計 ${totalDeleted} 件のメッセージを削除しました。`);
      }
  } else {
    appendLog("🛑 DMチャンネルが見つからなかったため、処理を中止しました。");
  }
  
  setControlsState(false);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  startDeletion();
});
stopBtn.addEventListener('click', () => {
  shouldStop = true;
  appendLog("🛑 ...停止処理を要求しました...");
});

setControlsState(false);

</script>
</body>
</html>
